<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP 練習題 Ch1~Ch3 AI版</title>
<style>
  :root {
    --primary: #1F4E79; --secondary: #2E75B6; --accent: #2E5F8A;
    --correct: #2E8B57; --correct-bg: #EAF5EA; --correct-border: #5CAF5C;
    --wrong: #C03030; --wrong-bg: #FFF0F0; --wrong-border: #E05050;
    --bg: #F4F7FB; --card: #FFFFFF; --border: #D0DCE8; --text: #222;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7; padding-bottom: 80px; }

  .hero { background: linear-gradient(135deg, #1F4E79, #2E75B6); color: white; padding: 20px 16px; text-align: center; }
  .hero h1 { font-size: 20px; font-weight: 700; }
  .hero p { font-size: 13px; opacity: .85; margin-top: 4px; }
  .hero .ai-badge { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 12px; font-size: 12px; margin-top: 6px; }

  .stats-bar { background: white; border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 20px; justify-content: center; font-size: 13px; }
  .stat { display: flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-c { background: var(--correct); }
  .dot-w { background: var(--wrong); }

  .q-wrap { padding: 14px 14px 0; }

  /* Loading */
  .loading-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 40px 20px; text-align: center; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e0e8f0; border-top-color: var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--accent); font-size: 14px; font-weight: 600; }
  .loading-sub { color: #888; font-size: 12px; margin-top: 4px; }

  /* Question card */
  .q-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; display: none; }
  .q-header { background: var(--primary); color: white; padding: 9px 14px; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .q-header .ai-tag { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 1px 8px; font-size: 11px; }
  .q-body { padding: 16px 14px 14px; }
  .q-text { font-size: 15px; font-weight: 600; line-height: 1.75; margin-bottom: 16px; color: #1a1a1a; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 13px 13px; border-radius: 10px;
    border: 2px solid var(--border); background: #FAFCFF;
    cursor: pointer; transition: all .18s; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .option:active:not(.disabled) { transform: scale(0.98); }
  .option.selected { border-color: var(--secondary); background: #EEF6FF; }
  .option.correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .option.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
  .option.show-correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .option.disabled { cursor: default; pointer-events: none; }

  .opt-label {
    min-width: 30px; height: 30px; border-radius: 50%;
    background: #E8EFF7; color: #555; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .18s; margin-top: 1px;
  }
  .option.selected .opt-label { background: var(--secondary); color: white; }
  .option.correct .opt-label { background: var(--correct); color: white; }
  .option.wrong .opt-label { background: var(--wrong); color: white; }
  .option.show-correct .opt-label { background: var(--correct); color: white; }
  .opt-text { font-size: 13.5px; line-height: 1.6; padding-top: 3px; }

  /* Buttons - fixed at bottom */
  .btn-area { padding: 10px 14px 0; }
  .btn-confirm {
    width: 100%; padding: 15px;
    background: var(--primary); color: white; border: none;
    border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-confirm:disabled { opacity: .35; cursor: default; }
  .btn-confirm.active { opacity: 1; }

  /* Explanation */
  .explanation { margin-top: 12px; border-radius: 10px; padding: 14px; font-size: 13.5px; line-height: 1.7; display: none; }
  .explanation.correct-exp { background: var(--correct-bg); border-left: 4px solid var(--correct-border); color: #1a4a1a; }
  .explanation.wrong-exp { background: var(--wrong-bg); border-left: 4px solid var(--wrong-border); color: #4a1a1a; }
  .exp-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .exp-trap { background: rgba(0,0,0,0.07); border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 12.5px; }
  .exp-trap-title { font-weight: 700; margin-bottom: 3px; }

  .btn-next {
    width: 100%; padding: 15px; margin-top: 10px;
    background: white; color: var(--primary);
    border: 2px solid var(--primary); border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: none; transition: all .2s;
  }
  .btn-next:active { background: var(--primary); color: white; }

  /* Error */
  .error-card { background: var(--card); border-radius: 14px; border: 1px solid var(--wrong-border); padding: 24px 16px; text-align: center; display: none; }
  .error-card p { color: var(--wrong); font-size: 14px; margin-bottom: 12px; }
  .btn-retry-err { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* Result */
  .result-screen { display: none; padding: 20px 14px; }
  .result-circle { width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg, #1F4E79, #2E75B6); color: white; margin: 0 auto 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .result-circle .big { font-size: 36px; font-weight: 800; line-height: 1; }
  .result-circle .small { font-size: 11px; opacity: .85; }
  .result-title { font-size: 20px; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 6px; }
  .result-sub { font-size: 13px; color: #666; text-align: center; margin-bottom: 16px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .ri-box { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 14px; text-align: center; }
  .ri-box .n { font-size: 26px; font-weight: 800; color: var(--primary); }
  .ri-box .l { font-size: 12px; color: #888; margin-top: 2px; }
  .review-list { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
  .rev-head { padding: 10px 14px; font-weight: 700; font-size: 13px; color: var(--primary); border-bottom: 1px solid #f0f0f0; }
  .rev-item { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .rev-item:last-child { border-bottom: none; }
  .rev-item .ans { font-size: 12px; color: #888; margin-top: 2px; }
  .btn-new { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="hero">
  <h1>PMP 練習題</h1>
  <p>Ch1~Ch3 · 專案管理入門</p>
  <span class="ai-badge">⚡ AI 動態出題 · 每次不同</span>
</div>

<div class="stats-bar">
  <div class="stat"><div class="dot dot-c"></div><span id="sc">0</span> 答對</div>
  <div class="stat"><div class="dot dot-w"></div><span id="sw">0</span> 答錯</div>
  <div class="stat">📊 第 <span id="sn">1</span> 題</div>
</div>

<div class="q-wrap">
  <!-- Loading -->
  <div class="loading-card" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">AI 正在出題中…</div>
    <div class="loading-sub">每次都是全新題目</div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card">
    <p id="error-msg">出題失敗，請重試</p>
    <button class="btn-retry-err" onclick="loadQuestion()">重新出題</button>
  </div>

  <!-- Question -->
  <div class="q-card" id="q-card">
    <div class="q-header">
      <span id="q-tag">Ch1~Ch3</span>
      <span class="ai-tag">AI 出題</span>
    </div>
    <div class="q-body">
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation">
        <div class="exp-title" id="exp-title"></div>
        <div id="exp-body"></div>
        <div class="exp-trap" id="exp-trap" style="display:none">
          <div class="exp-trap-title">🎯 考試關鍵字</div>
          <div id="exp-trap-body"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Buttons outside card so always visible -->
<div class="btn-area" id="btn-area" style="display:none">
  <button class="btn-confirm" id="btn-confirm" disabled onclick="confirmAnswer()">確認答案</button>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一題 →</button>
</div>

<!-- Result -->
<div class="result-screen" id="result-screen">
  <div class="result-circle">
    <div class="big" id="res-score"></div>
    <div class="small">分</div>
  </div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-grid">
    <div class="ri-box"><div class="n" id="res-c"></div><div class="l">✅ 答對</div></div>
    <div class="ri-box"><div class="n" id="res-w"></div><div class="l">❌ 答錯</div></div>
  </div>
  <div class="review-list" id="review-list"></div>
  <button class="btn-new" onclick="startNew()">🔄 再來一輪新題目</button>
</div>

<script>
const TOTAL = 6;
let current = 0;
let selected = null;
let answered = false;
let results = [];
let currentQ = null;

const SYSTEM_PROMPT = `你是一位 PMP 考試出題專家，專門出 Ch1~Ch3（專案管理入門）的情境選擇題。

出題範圍：
- 專案 vs 非專案（Operations）的判斷
- 組織架構（職能型、矩陣型、專案型）
- PMO 的角色與 PM、Sponsor、功能經理的分工
- 五大流程群組（起始、規劃、執行、監控、結案）與各自的代表文件/活動
- 重要文件（Business Case、Benefit Management Plan、Project Charter、Project Management Plan、OPA）的用途與時機
- 四種管理方法論（計畫型、迭代式、增量式、敏捷式、混合式）
- Portfolio / Program / Project 的層級差異
- 商業價值（Business Value）的定義

出題要求：
1. 題目必須是情境題，描述一個真實場景，讓答題者需要理解才能判斷
2. 每次出不同情境，不要重複類似的場景
3. 選項 A、B、C、D 都要有中文名稱 + 英文名稱（例如：專案章程 Project Charter）
4. 錯誤選項要設計成「似乎有道理但有一個關鍵錯誤」，不要太明顯
5. 解析要說明「為什麼這個是對的」和「其他選項哪裡錯了」
6. 考試關鍵字要點出這道題的核心判斷邏輯

回傳格式（嚴格 JSON，不要有任何多餘文字）：
{
  "tag": "Ch1~Ch3 · [考點名稱]",
  "text": "題目情境（150字以內）",
  "options": [
    {"label": "A", "text": "選項A文字（含中英文）"},
    {"label": "B", "text": "選項B文字（含中英文）"},
    {"label": "C", "text": "選項C文字（含中英文）"},
    {"label": "D", "text": "選項D文字（含中英文）"}
  ],
  "correct": 0,
  "explanation": "答對/答錯的解析，說明正確答案為什麼對、其他選項哪裡錯（150字以內）",
  "key_concept": "這道題的核心判斷邏輯（50字以內）"
}

correct 是正確選項的 index（0=A, 1=B, 2=C, 3=D）`;

async function loadQuestion() {
  // Show loading
  document.getElementById('loading').style.display = 'block';
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('error-card').style.display = 'none';
  document.getElementById('btn-area').style.display = 'none';
  selected = null;
  answered = false;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: `請出一道 Ch1~Ch3 的 PMP 情境選擇題。已出過的考點請盡量避免重複，這是第 ${current + 1} 題。`
        }]
      })
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();
    const raw = data.content[0].text.trim();

    // Parse JSON
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Invalid JSON response');
    currentQ = JSON.parse(jsonMatch[0]);

    renderQuestion(currentQ);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-card').style.display = 'block';
    document.getElementById('error-msg').textContent = '出題失敗，請點下方重試';
    console.error(e);
  }
}

function renderQuestion(q) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('q-card').style.display = 'block';
  document.getElementById('btn-area').style.display = 'block';

  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-confirm').style.display = 'block';
  document.getElementById('btn-next').style.display = 'none';

  const exp = document.getElementById('explanation');
  exp.style.display = 'none';
  exp.className = 'explanation';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="opt-label">${o.label}</div><div class="opt-text">${o.text}</div>`;
    div.addEventListener('click', () => selectOption(i));
    opts.appendChild(div);
  });
}

function selectOption(i) {
  if (answered) return;
  selected = i;
  document.querySelectorAll('.option').forEach((o, idx) => {
    o.classList.toggle('selected', idx === i);
    o.classList.remove('correct', 'wrong', 'show-correct');
  });
  document.getElementById('btn-confirm').disabled = false;
}

function confirmAnswer() {
  if (selected === null || answered) return;
  answered = true;

  const q = currentQ;
  const isCorrect = selected === q.correct;
  results.push({
    correct: isCorrect,
    tag: q.tag,
    selected: q.options[selected].label,
    answer: q.options[q.correct].label,
    qShort: q.text.substring(0, 38) + '…'
  });

  document.querySelectorAll('.option').forEach((o, i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct');
    else if (i === selected && !isCorrect) o.classList.add('wrong');
  });

  const exp = document.getElementById('explanation');
  exp.style.display = 'block';
  exp.className = 'explanation ' + (isCorrect ? 'correct-exp' : 'wrong-exp');
  document.getElementById('exp-title').textContent = isCorrect ? '✅ 答對了！' : '❌ 答錯了';
  document.getElementById('exp-body').textContent = q.explanation;

  const trapEl = document.getElementById('exp-trap');
  if (q.key_concept) {
    trapEl.style.display = 'block';
    document.getElementById('exp-trap-body').textContent = q.key_concept;
  } else {
    trapEl.style.display = 'none';
  }

  document.getElementById('btn-confirm').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
  document.getElementById('btn-next').textContent =
    current < TOTAL - 1 ? '下一題 →' : '查看結果 →';

  // Update stats
  const c = results.filter(r => r.correct).length;
  const w = results.filter(r => !r.correct).length;
  document.getElementById('sc').textContent = c;
  document.getElementById('sw').textContent = w;

  // Scroll to show explanation
  setTimeout(() => {
    exp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function nextQuestion() {
  if (current < TOTAL - 1) {
    current++;
    document.getElementById('sn').textContent = current + 1;
    loadQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function showResult() {
  document.querySelector('.q-wrap').style.display = 'none';
  document.getElementById('btn-area').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const c = results.filter(r => r.correct).length;
  const score = Math.round((c / TOTAL) * 100);
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-c').textContent = c;
  document.getElementById('res-w').textContent = TOTAL - c;

  let title, sub;
  if (score >= 90) { title = '非常優秀！🎉'; sub = '概念掌握得很好，可以繼續挑戰其他章節！'; }
  else if (score >= 75) { title = '表現不錯！💪'; sub = '再複習錯誤的部分，目標 90 分！'; }
  else if (score >= 60) { title = '還需要加強 📚'; sub = '把答錯的考點重新看筆記，再練習一次！'; }
  else { title = '需要多複習 🔍'; sub = '建議先回頭看 Ch1~Ch3 的筆記，再來一輪！'; }

  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = sub;

  const list = document.getElementById('review-list');
  list.innerHTML = '<div class="rev-head">📋 各題回顧</div>';
  results.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'rev-item';
    d.innerHTML = `<span style="font-size:16px;flex-shrink:0">${r.correct ? '✅' : '❌'}</span>
      <div>
        <div>${r.tag}</div>
        <div class="ans">${r.correct ? '答對' : `您選 ${r.selected}，正確答案 ${r.answer}`}</div>
      </div>`;
    list.appendChild(d);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startNew() {
  current = 0; selected = null; answered = false; results = [];
  document.getElementById('sc').textContent = 0;
  document.getElementById('sw').textContent = 0;
  document.getElementById('sn').textContent = 1;
  document.querySelector('.q-wrap').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  loadQuestion();
}

// Start
loadQuestion();
</script>
</body>
</html>
